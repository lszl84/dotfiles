# MangoWM config - dwm-style setup for Wayland
# Hot-reloadable: just save to apply changes

general {
    # Gaps and borders (0 = dwm-style, no gaps)
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    
    # No rounding by default
    rounding = 0
    
    # Dim inactive windows (like picom)
    inactive_opacity = 0.9
    
    # Cursor
    cursor_inactive_timeout = 0
    
    # Layout
    layout = master
    mfact = 0.55
    nmaster = 1
}

# Tags (like dwm workspaces)
tags {
    names = 1 2 3 4
}

# Mouse
mouse {
    sensitivity = 1.0
    natural_scroll = true
}

# Keybindings (dwm-style)
binds {
    # Launch terminal
    bind = SUPER, Return, exec, st
    
    # Launch launcher
    bind = SUPER, Space, exec, rofi -show drun
    
    # Close window
    bind = SUPER, Q, kill
    
    # Toggle floating
    bind = SUPER SHIFT, Space, togglefloating
    
    # Toggle fullscreen
    bind = SUPER, F, fullscreen
    
    # Tag switching (1-4 like dwm)
    bind = SUPER, 1, tag, 1
    bind = SUPER, 2, tag, 2
    bind = SUPER, 3, tag, 3
    bind = SUPER, 4, tag, 4
    
    # Move window to tag
    bind = SUPER SHIFT, 1, movetag, 1
    bind = SUPER SHIFT, 2, movetag, 2
    bind = SUPER SHIFT, 3, movetag, 3
    bind = SUPER SHIFT, 4, movetag, 4
    
    # Next/previous tag
    bind = SUPER, Right, tag, +1
    bind = SUPER, Left, tag, -1
    
    # Lock screen
    bind = SUPER, L, exec, ~/.local/bin/dwm-lock
    
    # Volume keys
    bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
    bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    
    # Brightness keys
    bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
    bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
    
    # Mouse buttons for moving/resizing floating windows
    bindm = SUPER, mouse:272, movewindow
    bindm = SUPER, mouse:273, resizewindow
}

# Window rules (rounded corners for specific classes)
windowrule = opacity 0.9, class:^(.*)$  # Dim all inactive

# Rounded corners for floating-style windows
windowrule = rounding 16, class:^(firefox)$
windowrule = rounding 16, class:^(thunderbird)$

# No rounding for terminal (like dwm)
windowrule = rounding 0, class:^(st)$

# Autostart
exec-once = xsettingsd -c ~/.config/dwm/xsettingsd.conf &
exec-once = dunst &
exec-once = xss-lock -l -- ~/.local/bin/dwm-lock &
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = /usr/lib/xdg-desktop-portal &
exec-once = gnome-keyring-daemon --start --components=secrets
