# MangoWM config - matches dwm setup
# Docs: https://mangowm.github.io/docs/

# === MONITOR - 2880x1800 @ 1.75x native scaling ===
monitorrule=name:eDP-1,width:2880,height:1800,refresh:120,x:0,y:0,scale:1.75

# === VISUAL - match dwm ===
# Zero gaps (dwm-style)
gappih=0
gappiv=0
gappoh=0
gappov=0

# No borders
borderpx=0
bordercolor=0x353535ff
focuscolor=0x353535ff
no_border_when_single=1

# Dim inactive windows (like picom inactive-dim = 0.35)
focused_opacity=1.0
unfocused_opacity=0.65

# Rounded corners only for specific windows (set via windowrule below)
border_radius=0
no_radius_when_single=1

# No shadows (dwm-style)
shadows=0
shadow_only_floating=0

# No blur
blur=0
blur_layer=0

# No animations (dwm-style instant)
animations=0
layer_animations=0

# Root/background color (black like dwm)
rootcolor=0x000000ff

# === LAYOUT - match dwm ===
# Master-stack like dwm
default_mfact=0.55
default_nmaster=1
new_is_master=1
smartgaps=0

# Tags 1-4 (like dwm)
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile

# === INPUT ===
repeat_rate=40
repeat_delay=300
xkb_rules_layout=us
numlockon=0

# Trackpad - match dwm touchpad settings
tap_to_click=1
tap_and_drag=1
trackpad_natural_scrolling=1
drag_lock=1
disable_while_typing=1
click_method=2

# Mouse
mouse_natural_scrolling=0

# Cursor (scaled for HiDPI)
cursor_size=24

# Focus - hover to change focus (like dwm sloppyfocus)
sloppyfocus=1
warpcursor=1

# === ENVIRONMENT VARIABLES ===
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=XCURSOR_SIZE,24

# === KEYBINDINGS - match dwm exactly ===

# Terminal (Super+Return)
bind=SUPER,Return,spawn,foot

# Launcher (Super+Space)
bind=SUPER,Space,spawn,fuzzel

# Kill window (Super+BackSpace)
bind=SUPER,BackSpace,killclient,

# Focus stack (Super+J/K)
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# Alt-Tab window cycling
bind=ALT,Tab,focusstack,next
bind=ALT+SHIFT,Tab,focusstack,prev

# Add/remove master (Super+I/D)
bind=SUPER,i,incnmaster,+1
bind=SUPER,d,incnmaster,-1

# Change mfact (Super+Comma/Period)
bind=SUPER,comma,setmfact,-0.05
bind=SUPER,period,setmfact,+0.05

# Zoom/promote to master (Super+Shift+Return)
bind=SUPER+SHIFT,Return,zoom

# Layout switching (Super+T/M/N like dwm)
bind=SUPER,t,setlayout,tile
bind=SUPER,m,setlayout,monocle
bind=SUPER,n,switch_layout

# Toggle bar (Super+B) - toggle gaps as visual indicator
bind=SUPER,b,togglegaps

# Last tag (Super+Tab)
bind=SUPER,Tab,view,-1

# Toggle floating (Super+Shift+Space)
bind=SUPER+SHIFT,Space,togglefloating,

# Toggle fullscreen (Super+F)
bind=SUPER,f,togglefullscreen,

# Lock screen (Super+L)
bind=SUPER,l,spawn,swaylock -f -c 000000

# Tag switching (Super+1-4)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0

# Move to tag (Super+Shift+1-4)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0

# Next/prev tag (Super+Left/Right)
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=CTRL+ALT,Left,viewtoleft,0
bind=CTRL+ALT,Right,viewtoright,0

# Quit MangoWM (Super+Shift+BackSpace)
bind=SUPER+SHIFT,BackSpace,quit

# Reload config
bind=SUPER,r,reload_config

# === MEDIA KEYS ===
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%-

# === SCREENSHOTS (Wayland-native: grim + slurp) ===
bind=NONE,Print,spawn,grim ~/Screenshots/$(date +%Y-%m-%d-%H%M%S).png
bind=SHIFT,Print,spawn,grim -g "$(slurp)" ~/Screenshots/$(date +%Y-%m-%d-%H%M%S)_area.png
bind=SUPER,Print,spawn,grim -g "$(slurp -o)" ~/Screenshots/$(date +%Y-%m-%d-%H%M%S)_window.png

# === MOUSE ===
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# === GESTURES ===
# Three-finger swipe to change tags (like touchegg in dwm)
gesturebind=none,left,3,viewtoright,0
gesturebind=none,right,3,viewtoleft,0

# Four-finger swipe for overview
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

# === WINDOW RULES ===
# Floating apps (match dwm rules)
windowrule=float,class:^(Gimp)$
windowrule=float,class:^(VibeCut)$
windowrule=float,class:^(wxapp)$

# Rounded corners for specific apps
windowrule=rounding:16,class:^(firefox)$
windowrule=rounding:16,class:^(thunderbird)$

# === AUTOSTART ===
exec-once=dunst &
exec-once=swayidle -w timeout 1200 'swaylock -f -c 000000' &
exec-once=/usr/lib/xdg-desktop-portal-wlr &
exec-once=/usr/lib/xdg-desktop-portal &
exec-once=gnome-keyring-daemon --start --components=pkcs11,secrets,ssh &
