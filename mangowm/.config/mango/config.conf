# MangoWM config - matches dwm setup
# Format: key=value (simple, no sections)

# === VISUAL - match dwm ===
# Zero gaps (dwm-style)
gappih=0
gappiv=0
gappoh=0
gappov=0

# No borders
borderpx=0
no_border_when_single=1

# Dim inactive windows (like picom 0.9 opacity)
focused_opacity=1.0
unfocused_opacity=0.9

# No rounding by default (set per-window below)
border_radius=0
no_radius_when_single=1

# No shadows (dwm-style)
shadows=0
shadow_only_floating=0

# No blur
blur=0

# No animations (dwm-style instant)
animations=0

# === LAYOUT - match dwm ===
# Master-stack like dwm
default_mfact=0.55
default_nmaster=1
new_is_master=1
smartgaps=0

# Tags 1-4 (like dwm)
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile

# === KEYBOARD - match dwm ===
repeat_rate=40
repeat_delay=300
xkb_rules_layout=us
numlockon=0

# Terminal (Super+Return)
bind=SUPER,Return,spawn,st

# Launcher (Super+Space) - using fuzzel
bind=SUPER,Space,spawn,fuzzel

# Kill window (Super+BackSpace)
bind=SUPER,BackSpace,killclient,

# Toggle bar (Super+B) - if you have a bar script
bind=SUPER,b,spawn,pkill -SIGUSR1 dwm-status

# Focus stack (Super+J/K)
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# Add/remove master (Super+I/D)
bind=SUPER,i,incnmaster,+1
bind=SUPER,d,incnmaster,-1

# Change mfact (Super+H/L)
bind=SUPER,h,setmfact,-0.05
bind=SUPER,l,setmfact,+0.05
bind=SUPER,comma,setmfact,-0.05
bind=SUPER,period,setmfact,+0.05

# Zoom/promote to master (Super+Shift+Return)
bind=SUPER+SHIFT,Return,zoom

# Toggle floating (Super+Shift+Space)
bind=SUPER+SHIFT,Space,togglefloating,

# Toggle fullscreen (Super+F)
bind=SUPER,f,togglefullscreen,

# Tag switching (Super+1-4)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0

# Move to tag (Super+Shift+1-4)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0

# Next/prev tag (Super+Left/Right)
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0

# Lock screen (Super+L) - using swaylock
bind=SUPER,l,spawn,swaylock -f -c 000000

# Quit MangoWM (Super+Shift+BackSpace)
bind=SUPER+SHIFT,BackSpace,quit

# === MEDIA KEYS ===
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ && pkill -USR1 dwm-status
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && pkill -USR1 dwm-status
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && pkill -USR1 dwm-status
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +10%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 10%-

# === SCREENSHOTS ===
bind=NONE,Print,spawn,scrot '%Y-%m-%d-%H%M%S.png' -e 'mv $f ~/Screenshots/'
bind=SHIFT,Print,spawn,scrot -s '%Y-%m-%d-%H%M%S_area.png' -e 'mv $f ~/Screenshots/'
bind=SUPER,Print,spawn,scrot -u '%Y-%m-%d-%H%M%S_window.png' -e 'mv $f ~/Screenshots/'

# === MOUSE ===
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# === WINDOW RULES ===
# Floating apps (match dwm rules)
windowrule=float,class:^(Gimp)$
windowrule=float,class:^(VibeCut)$
windowrule=float,class:^(wxapp)$

# Rounded corners for firefox/thunderbird
windowrule=rounding:16,class:^(firefox)$
windowrule=rounding:16,class:^(thunderbird)$

# No rounding for st terminal
windowrule=rounding:0,class:^(st)$

# === AUTOSTART ===
exec-once=xsettingsd -c ~/.config/dwm/xsettingsd.conf &
exec-once=dunst &
exec-once=swayidle -w timeout 1200 'swaylock -f -c 000000' &
exec-once=/usr/lib/xdg-desktop-portal-hyprland &
exec-once=/usr/lib/xdg-desktop-portal &
exec-once=gnome-keyring-daemon --start --components=secrets &
exec-once=~/.local/bin/dwm-status &
