# foot terminal config - matches st Modus Vivendi setup
# Docs: https://codeberg.org/dnkl/foot/src/branch/master/foot.ini

[main]
font=Adwaita Mono:size=14
pad=4x4

[scrollback]
lines=10000

[cursor]
color=141414 ffffff

[colors]
background=141414
foreground=ffffff

# Normal colors (Modus Vivendi)
regular0=000000  # black
regular1=ff5f59  # red
regular2=44bc44  # green
regular3=d0bc00  # yellow
regular4=2fafff  # blue
regular5=feacd0  # magenta
regular6=00d3d0  # cyan
regular7=bfbfbf  # white

# Bright colors
bright0=595959
bright1=ff5f5f
bright2=44df44
bright3=d3d00a
bright4=338fff
bright5=ff66ff
bright6=00eff0
bright7=ffffff
