# picom.conf — Compositor for dwm with floating window detection
# REQUIRES: dwm patched with _DWM_FLOATING X11 property

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# Dim inactive windows
inactive-dim = 0.35;

# Rounded corners - 16px for floating windows, sharp for tiled
# This requires dwm to set _DWM_FLOATING property on floating windows
corner-radius = 16;
rounded-corners-exclude = [
    # TILED WINDOWS: exclude windows WITHOUT _DWM_FLOATING property
    "! _DWM_FLOATING = 1",
    # Also exclude fullscreen and special windows
    "window_type = 'desktop'",
    "window_type = 'dock'",
    "window_type = 'toolbar'",
    "window_type = 'splash'",
    "override_redirect = true"
];

# Make rounded corners look better with anti-aliasing
round-borders = 1;

focus-exclude = [
    "window_type = 'dock'",
    "override_redirect = true"
];
