# picom.conf — Compositor for dwm

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# Dim inactive windows
inactive-dim = 0.35;

# Rounded corners - apply to ALL windows except fullscreen/dock/override_redirect
# Note: In dwm, we cannot perfectly distinguish floating vs tiled via X11 properties
# This gives rounded corners to most windows; fullscreen stays sharp
corner-radius = 12;
rounded-corners-exclude = [
    # Exclude fullscreen and special windows
    "window_type = 'desktop'",
    "window_type = 'dock'",
    "window_type = 'toolbar'",
    "window_type = 'splash'",
    "override_redirect = true"
];

# Make rounded corners look better with anti-aliasing
round-borders = 1;

focus-exclude = [
    "window_type = 'dock'",
    "override_redirect = true"
];
