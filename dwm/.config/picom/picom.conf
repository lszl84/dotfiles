# picom.conf — Compositor for dwm

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# Dim inactive windows
inactive-dim = 0.35;

# Rounded corners - only for floating windows
# In dwm, we can approximate this by excluding large windows (tiled)
corner-radius = 12;
rounded-corners-exclude = [
    # Exclude fullscreen and nearly-fullscreen windows (tiled)
    "width >= 3000 && height >= 2000",
    # Exclude specific window types
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'menu'",
    "window_type = 'dialog'",
    "override_redirect = true"
];

# Make rounded corners look better with anti-aliasing
# (requires picom with xrender or glx backend)
round-borders = 1;

focus-exclude = [
    "window_type = 'dock'",
    "override_redirect = true"
];
