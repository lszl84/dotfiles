# picom.conf — Compositor for dwm

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# Dim inactive windows
inactive-dim = 0.35;

# Rounded corners - ONLY for floating windows
# dwm sets _DWM_FLOATING=1 on floating windows via custom patch
corner-radius = 16;
rounded-corners-exclude = [
    # Exclude windows WITHOUT _DWM_FLOATING (i.e. tiled windows)
    "! _DWM_FLOATING@:32c = 1",
    # Also exclude special windows
    "window_type = 'desktop'",
    "window_type = 'dock'",
    "window_type = 'toolbar'",
    "window_type = 'splash'",
    "override_redirect = true"
];

# Make rounded corners look better
round-borders = 1;

focus-exclude = [
    "window_type = 'dock'",
    "override_redirect = true"
];
