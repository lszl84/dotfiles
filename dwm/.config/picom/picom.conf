# picom.conf — Compositor for dwm

backend = "glx";
vsync = true;

# No shadows
shadow = false;

# Dim inactive windows
inactive-dim = 0.35;

# Rounded corners - only for floating windows
# In dwm: floating windows are typically dialogs, popups, utility windows
# Tiled windows are 'normal' type and fill the tile area
corner-radius = 12;
rounded-corners-exclude = [
    # TILED WINDOWS: exclude 'normal' type (these fill tile areas in dwm)
    "window_type = 'normal'",
    # Also exclude fullscreen
    "window_type = 'desktop'",
    "window_type = 'dock'",
    "window_type = 'toolbar'",
    "override_redirect = true"
];

# Make rounded corners look better with anti-aliasing
round-borders = 1;

focus-exclude = [
    "window_type = 'dock'",
    "override_redirect = true"
];
